                        <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
                        <XAxis dataKey="year" tick={{fontSize:12,fill:C.muted}}/>
                        <YAxis tick={{fontSize:11,fill:C.muted}}/>
                        <Tooltip formatter={v=>[v+" customers"]}/>
                        <Bar dataKey="customers" radius={[4,4,0,0]}>
                          <Cell fill={C.muted}/><Cell fill={C.green}/>
                        </Bar>
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                  <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:8,padding:18}}>
                    <div style={{fontWeight:700,color:C.navy,marginBottom:14,fontSize:13}}>Annual Recurring Revenue — 2025 vs 2026</div>
                    <ResponsiveContainer width="100%" height={190}>
                      <BarChart data={revenueOverview}>
                        <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
                        <XAxis dataKey="year" tick={{fontSize:12,fill:C.muted}}/>
                        <YAxis tickFormatter={v=>`$${(v/1000).toFixed(0)}k`} tick={{fontSize:11,fill:C.muted}}/>
                        <Tooltip content={<RevTooltip/>}/>
                        <Bar dataKey="revenue" name="Revenue" radius={[4,4,0,0]}>
                          <Cell fill={C.muted}/><Cell fill={C.navy}/>
                        </Bar>
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                </div>
                <Callout type="green">
                  Pesty onboarded in January 2026. The three digital channels Pesty manages — Google Search, Website, and Google LSAs — produced <strong>{fmt$(pestyDig25)}</strong> in Jan–Jun 2025 before Pesty's involvement. In the same window under Pesty management, those same channels produced <strong>{fmt$(pestyDig26)}</strong> — an increase of <strong>{fmt$(digLift)} (+{Math.round(digLift/pestyDig25*100)}%)</strong> over the prior-year baseline.
                </Callout>
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14}}>
                  <KPI label="Total Calls Tracked (2026)" value="1,500" accent={C.navy}/>
                  <KPI label="First-Time Callers" value="1,135" sub="75.7% of all calls" accent={C.gold}/>
                  <KPI label="Qualified Leads" value="173" sub="From Pesty channels" accent={C.green} big/>
                  <KPI label="GBP Qual. Rate Post-Optimization" value="10.1%" sub="▲ from 5.2% pre-optimization" accent={C.red} big/>
                </div>
              </div>
            )}

            {/* ── GBP DEEP DIVE ─────────────────────────────────────── */}
            {tab===1&&(
              <div>
                <SectionHead eyebrow="Google Business Profile" title="GBP optimization on Apr 9 doubled the qualified lead rate." />
                <Callout type="navy">
                  <strong>How GBP calls actually work:</strong> When a potential customer searches "pest control near me" on Google Maps or Google Search, Pfitzer's Google Business Profile listing is what appears — the name, phone number, reviews, and service description. <strong>Pesty controls the visibility:</strong> the categories, keywords, service descriptions, photos, and UTM links that determine whether Pfitzer shows up and how high it ranks. <strong>Pfitzer's team controls the close:</strong> picking up the call and converting it. Both contributions matter — but the call wouldn't happen without the listing being optimized to appear.
                </Callout>
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:24}}>
                  <KPI label="GBP Calls Before Apr 9" value="631" sub="5.2% qual. rate" accent={C.muted}/>
                  <KPI label="GBP Calls After Apr 9" value="685" sub="10.1% qual. rate" accent={C.green} big/>
                  <KPI label="Qual. Leads Before" value="33" accent={C.muted}/>
                  <KPI label="Qual. Leads After" value="69" sub="▲ 109% improvement" accent={C.red} big/>
                </div>
                <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:8,padding:18,marginBottom:20}}>
                  <div style={{fontWeight:700,color:C.navy,marginBottom:14,fontSize:13}}>GBP Qualified Lead Rate — Before vs After Apr 9 Optimization</div>
                  <ResponsiveContainer width="100%" height={210}>
                    <BarChart data={gbpBeforeAfter}>
                      <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
                      <XAxis dataKey="period" tick={{fontSize:12,fill:C.muted}}/>
                      <YAxis yAxisId="left" tick={{fontSize:11,fill:C.muted}}/>
                      <YAxis yAxisId="right" orientation="right" tickFormatter={v=>`${v}%`} tick={{fontSize:11,fill:C.muted}}/>
                      <Tooltip/>
                      <Legend/>
                      <Bar yAxisId="left" dataKey="total" name="Total GBP Calls" fill={C.muted} radius={[4,4,0,0]}>
                        <Cell fill="#9BAAC4"/><Cell fill={C.navy}/>
                      </Bar>
                      <Bar yAxisId="left" dataKey="qualified" name="Qualified Leads" fill={C.red} radius={[4,4,0,0]}>
                        <Cell fill="#E8897E"/><Cell fill={C.red}/>
                      </Bar>
                      <Line yAxisId="right" type="monotone" dataKey="rate" name="Qual. Rate %" stroke={C.gold} strokeWidth={2} dot={{r:5,fill:C.gold}}/>
                    </BarChart>
                  </ResponsiveContainer>
                </div>
                <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:8,padding:18,marginBottom:20}}>
                  <div style={{fontWeight:700,color:C.navy,marginBottom:4,fontSize:13}}>Monthly GBP Calls &amp; Qualified Leads — Jan–Jun 2026</div>
                  <div style={{fontSize:11,color:C.muted,marginBottom:14}}>Tracking number data starts late Feb. March spike reflects GBP tracking going live across all markets simultaneously.</div>
                  <ResponsiveContainer width="100%" height={230}>
                    <BarChart data={monthlyGBP}>
                      <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
                      <XAxis dataKey="month" tick={{fontSize:12,fill:C.muted}}/>
                      <YAxis yAxisId="left" tick={{fontSize:11,fill:C.muted}}/>
                      <YAxis yAxisId="right" orientation="right" tickFormatter={v=>`${v}%`} tick={{fontSize:11,fill:C.muted}}/>
                      <Tooltip/>
                      <Legend/>
                      <ReferenceLine yAxisId="left" x="Apr" stroke={C.red} strokeDasharray="4 3" label={{value:"Apr 9: Optimization",position:"top",fontSize:10,fill:C.red}}/>
                      <Bar yAxisId="left" dataKey="total" name="Total GBP Calls" fill="#C5CDE0" radius={[3,3,0,0]}/>
                      <Bar yAxisId="left" dataKey="qualified" name="Qualified Leads" fill={C.navy} radius={[3,3,0,0]}/>
                      <Line yAxisId="right" type="monotone" dataKey="qualRate" name="Qual. Rate %" stroke={C.gold} strokeWidth={2} dot={{r:4,fill:C.gold}}/>
                    </BarChart>
                  </ResponsiveContainer>
                </div>
                <Callout type="green">
                  <strong>What changed on April 9:</strong> Pesty completed a full GBP optimization pass across all 6 locations — updating service categories, rewriting business descriptions with local keywords, adding service area details, refreshing photos, and verifying UTM-tagged website links. The qualified lead rate went from 5.2% to 10.1% — a 94% improvement in lead quality from the same channel.
                </Callout>
                <Callout type="gold">
                  <strong>A note on March volume:</strong> The high call volume in March (587 GBP calls) reflects tracking numbers going live across markets simultaneously. The low qualification rate (4.4%) that month is expected — early tracking captures a broader mix including existing customers and informational inquiries. As the system calibrates and optimization takes hold, quality improves significantly.
                </Callout>
              </div>
            )}

            {/* ── DIGITAL ATTRIBUTION ───────────────────────────────── */}
            {tab===2&&(
              <div>
                <SectionHead eyebrow="Digital Channel Performance" title="Before Pesty vs. with Pesty — same channels, measurably different results." />
                <Callout type="navy">
                  <strong>How to read this comparison:</strong> Pesty began managing Pfitzer's digital channels in January 2026. The 2025 figures show what Google Search, Website, and LSA produced <em>before Pesty's involvement</em> — they are a baseline, not a Pesty result. The 2026 figures reflect performance under Pesty management. The difference between the two is the most direct measure of Pesty's impact.
                </Callout>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:24}}>
                  <KPI label="Digital Revenue — Before Pesty (2025)" value={fmt$(pestyDig25)} sub="Google Search + Website + LSA" accent={C.muted}/>
                  <KPI label="Digital Revenue — With Pesty (2026)" value={fmt$(pestyDig26)} sub="Same channels, first year with Pesty" accent={C.green} big/>
                  <KPI label="Increase on These Channels" value={`+${fmt$(digLift)}`} sub={`+${Math.round(digLift/pestyDig25*100)}% over prior-year baseline`} accent={C.red} big/>
                </div>
                <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:8,padding:18,marginBottom:20}}>
                  <div style={{fontWeight:700,color:C.navy,marginBottom:4,fontSize:13}}>Revenue by Channel — Jan–Jun 2025 (Pre-Pesty) vs Jan–Jun 2026 (With Pesty)</div>
                  <div style={{fontSize:11,color:C.muted,marginBottom:14}}>Same three channels, same time window. Pesty onboarded January 2026.</div>
                  <ResponsiveContainer width="100%" height={260}>
                    <BarChart data={digitalSources} barCategoryGap="30%" barGap={4}>
                      <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
                      <XAxis dataKey="source" tick={{fontSize:12,fill:C.muted}}/>
                      <YAxis tickFormatter={v=>`$${(v/1000).toFixed(0)}k`} tick={{fontSize:11,fill:C.muted}}/>
                      <Tooltip content={<RevTooltip/>}/>
                      <Legend/>
                      <Bar dataKey="rev2025" name="2025 — Pre-Pesty Baseline" fill="#9BAAC4" radius={[4,4,0,0]}/>
                      <Bar dataKey="rev2026" name="2026 — With Pesty" fill={C.navy} radius={[4,4,0,0]}/>
                    </BarChart>
                  </ResponsiveContainer>
                </div>
                <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                    <thead>
                      <tr style={{background:C.navy}}>
                        {["Channel","Pre-Pesty Cust.","With Pesty Cust.","Δ Cust.","Pre-Pesty Rev. (2025)","With Pesty Rev. (2026)","Change"].map(h=>(
                          <th key={h} style={{padding:"10px 12px",color:C.white,fontWeight:700,textAlign:h==="Channel"?"left":"right",fontSize:11,whiteSpace:"nowrap"}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {digitalSources.map((row,i)=>{
                        const g=((row.rev2026-row.rev2025)/row.rev2025*100).toFixed(1);
                        return (
                          <tr key={row.source} style={{background:i%2===0?C.white:C.light}}>
                            <td style={{padding:"10px 12px",fontWeight:600,color:C.navy}}>{row.source}</td>
                            <td style={{padding:"10px 12px",textAlign:"right",color:C.muted}}>{row.c25}</td>
                            <td style={{padding:"10px 12px",textAlign:"right",fontWeight:700}}>{row.c26}</td>
                            <td style={{padding:"10px 12px",textAlign:"right",color:C.green,fontWeight:700}}>+{row.c26-row.c25}</td>
                            <td style={{padding:"10px 12px",textAlign:"right",color:C.muted}}>{fmt$(row.rev2025)}</td>
                            <td style={{padding:"10px 12px",textAlign:"right",fontWeight:700}}>{fmt$(row.rev2026)}</td>
                            <td style={{padding:"10px 12px",textAlign:"right",fontWeight:700,color:parseFloat(g)>=0?C.green:C.red}}>
                              {parseFloat(g)>=0?"+":""}{g}%
                            </td>
                          </tr>
                        );
                      })}
                      <tr style={{background:"#EEF2FF",borderTop:`2px solid ${C.navy}`}}>
                        <td style={{padding:"12px",fontWeight:800,color:C.navy}}>TOTAL</td>
                        <td style={{padding:"12px",textAlign:"right",fontWeight:700,color:C.muted}}>{digitalSources.reduce((a,r)=>a+r.c25,0)}</td>
                        <td style={{padding:"12px",textAlign:"right",fontWeight:700}}>{digitalSources.reduce((a,r)=>a+r.c26,0)}</td>
                        <td style={{padding:"12px",textAlign:"right",fontWeight:700,color:C.green}}>+{digitalSources.reduce((a,r)=>a+(r.c26-r.c25),0)}</td>
                        <td style={{padding:"12px",textAlign:"right",fontWeight:700,color:C.muted}}>{fmt$(pestyDig25)}</td>
                        <td style={{padding:"12px",textAlign:"right",fontWeight:800,color:C.navy}}>{fmt$(pestyDig26)}</td>
                        <td style={{padding:"12px",textAlign:"right",fontWeight:800,color:C.green}}>+{Math.round(digLift/pestyDig25*100)}%</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
                <div style={{marginTop:12,fontSize:11,color:C.muted}}>
                  Note: LSA revenue is down slightly year-over-year. This reflects verification challenges in early 2026 that are documented and actively being resolved. Google Search and Website more than offset this.
                </div>
              </div>
            )}

            {/* ── LEAD SOURCES ──────────────────────────────────────── */}
            {tab===3&&(
              <div>
                <SectionHead eyebrow="All Lead Sources" title="Full year-over-year breakdown by customer source." />
                <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:8,overflow:"hidden",marginBottom:16}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                    <thead>
                      <tr style={{background:C.navy}}>
                        {["Lead Source","2025 Cust.","2025 Revenue","2026 Cust.","2026 Revenue","Rev Change","% Chg"].map(h=>(
                          <th key={h} style={{padding:"10px 14px",color:C.white,fontWeight:700,textAlign:h==="Lead Source"?"left":"right",fontSize:12}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {allSources.map((row,i)=>{
                        const delta=row.r26-row.r25;
                        const pct=((delta/row.r25)*100).toFixed(1);
                        const isD=["Google Search","Website","Google LSA's"].includes(row.source);
                        return (
                          <tr key={row.source} style={{background:i%2===0?C.white:C.light}}>
                            <td style={{padding:"10px 14px",fontWeight:isD?700:500,color:C.navy}}>
                              {isD&&<span style={{display:"inline-block",width:7,height:7,borderRadius:"50%",background:C.red,marginRight:7,verticalAlign:"middle"}}/>}
                              {row.source}
                            </td>
                            <td style={{padding:"10px 14px",textAlign:"right",color:C.muted}}>{row.c25}</td>
                            <td style={{padding:"10px 14px",textAlign:"right",color:C.muted}}>{fmt$(row.r25)}</td>
                            <td style={{padding:"10px 14px",textAlign:"right",fontWeight:700}}>{row.c26}</td>
                            <td style={{padding:"10px 14px",textAlign:"right",fontWeight:700}}>{fmt$(row.r26)}</td>
                            <td style={{padding:"10px 14px",textAlign:"right",fontWeight:700,color:delta>=0?C.green:C.red}}>{delta>=0?"+":""}{fmt$(delta)}</td>
                            <td style={{padding:"10px 14px",textAlign:"right",fontWeight:700,color:parseFloat(pct)>=0?C.green:C.red}}>{parseFloat(pct)>=0?"+":""}{pct}%</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                  <div style={{padding:"10px 14px",background:C.light,borderTop:`1px solid ${C.border}`,fontSize:11,color:C.muted}}>
                    <span style={{display:"inline-block",width:7,height:7,borderRadius:"50%",background:C.red,marginRight:6}}/>
                    Red dot = Pesty-managed digital channel
                  </div>
                </div>
                <Callout type="gold">
                  <strong>Personal Contact Leads dropped 80%</strong> ($9,436 → $1,843). This reflects a reduction in Pfitzer's own outbound sales activity, not a marketing performance issue. Pesty-managed digital channels added $25,133 in net new revenue over the same period, more than offsetting the decline.
                </Callout>
              </div>
            )}

            {/* ── RECONCILIATION ────────────────────────────────────── */}
            {tab===4&&(
              <div>
                <SectionHead eyebrow="CRM + CallRail Cross-Reference" title="Pfitzer customers traced back to Pesty-managed digital leads." />
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:20}}>
                  <KPI label="Digital CRM Customers Reviewed" value={reconData.length} accent={C.navy}/>
                  <KPI label="Phone-Confirmed Matches" value={reconData.filter(r=>r.match_type==="Phone Match").length} sub={`${fmt$(confirmedRevenue)} ARV`} accent={C.green} big/>
                  <KPI label="Source-Confirmed Matches" value={reconData.filter(r=>r.match_type==="Source Match").length} sub={`${fmt$(likelyRevenue)} ARV`} accent={C.teal}/>
                  <KPI label="Total Attributable ARV" value={fmt$(confirmedRevenue+likelyRevenue)} sub="Pesty digital channels" accent={C.red} big/>
                </div>
                <Callout type="navy">
                  <strong>How to read this table:</strong> "Phone Match" means the customer's phone number in Pfitzer's CRM appears in a CallRail qualified lead record — a direct, verifiable link between a Pesty-tracked call and a closed customer. "Source Match" means the CRM lead source aligns with a Pesty-managed channel, but phone numbers weren't in the CallRail window. CallRail only tracks marketing-sourced calls; some customers may have called a direct line not covered by a tracking number.
                </Callout>
                <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <span style={{fontSize:12,fontWeight:600,color:C.muted}}>Match type:</span>
                    {["All","Phone Match","Source Match"].map(f=>(
                      <button key={f} onClick={()=>setReconFilter(f)} style={{
                        padding:"5px 12px",border:`1px solid ${reconFilter===f?C.navy:C.border}`,borderRadius:20,
                        background:reconFilter===f?C.navy:C.white,color:reconFilter===f?C.white:C.muted,
                        cursor:"pointer",fontSize:12,fontWeight:reconFilter===f?700:400,
                      }}>{f}</button>
                    ))}
                  </div>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <span style={{fontSize:12,fontWeight:600,color:C.muted}}>Source:</span>
                    {["All","Google Search","Website","Google LSA's"].map(f=>(
                      <button key={f} onClick={()=>setSrcFilter(f)} style={{
                        padding:"5px 12px",border:`1px solid ${srcFilter===f?C.red:C.border}`,borderRadius:20,
                        background:srcFilter===f?C.red:C.white,color:srcFilter===f?C.white:C.muted,
                        cursor:"pointer",fontSize:12,fontWeight:srcFilter===f?700:400,
                      }}>{f}</button>
                    ))}
                  </div>
                </div>
                <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:8,overflow:"auto",maxHeight:460}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:700}}>
                    <thead style={{position:"sticky",top:0,zIndex:1}}>
                      <tr style={{background:C.navy}}>
                        {["CID","Location","Sold Date","CRM Source","CallRail Source","ARV","Match Type","Status"].map(h=>(
                          <th key={h} style={{padding:"9px 12px",color:C.white,fontWeight:700,textAlign:h==="ARV"?"right":"left",fontSize:11,whiteSpace:"nowrap"}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {filteredRecon.map((row,i)=>{
                        const isConf = row.match_type==="Phone Match";
                        return (
                          <tr key={row.cid} style={{background:i%2===0?C.white:C.light}}>
                            <td style={{padding:"8px 12px",color:C.muted,fontFamily:"monospace"}}>{row.cid}</td>
                            <td style={{padding:"8px 12px",fontWeight:500}}>{row.location}</td>
                            <td style={{padding:"8px 12px",color:C.muted,whiteSpace:"nowrap"}}>{row.sold}</td>
                            <td style={{padding:"8px 12px"}}>{row.crm_source}</td>
                            <td style={{padding:"8px 12px",color:row.callrail_source==="GBP"?C.red:C.navy,fontWeight:row.callrail_source==="GBP"?700:400}}>
                              {row.callrail_source==="GBP"?"GBP (Pesty-optimized)":row.callrail_source}
                            </td>
                            <td style={{padding:"8px 12px",textAlign:"right",fontWeight:700}}>{fmtD(row.arv)}</td>
                            <td style={{padding:"8px 12px"}}>
                              <span style={{display:"inline-block",padding:"2px 9px",borderRadius:12,fontSize:11,fontWeight:700,
                                background:isConf?"#E6F4EE":"#EEF1F7",color:isConf?C.green:C.navy}}>
                                {row.match_type}
                              </span>
                            </td>
                            <td style={{padding:"8px 12px"}}>
                              <span style={{display:"inline-block",padding:"2px 9px",borderRadius:12,fontSize:11,fontWeight:700,
                                background:isConf?"#E6F4EE":"#FFF8EC",color:isConf?C.green:C.gold}}>
                                {isConf?"Confirmed":"Likely"}
                              </span>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                    <tfoot style={{position:"sticky",bottom:0}}>
                      <tr style={{background:"#EEF2FF",borderTop:`2px solid ${C.navy}`}}>
                        <td colSpan={5} style={{padding:"10px 12px",fontWeight:800,color:C.navy,fontSize:12}}>
                          Showing {filteredRecon.length} of {reconData.length} records
                        </td>
                        <td style={{padding:"10px 12px",textAlign:"right",fontWeight:800,color:C.navy,fontSize:12}}>
                          {fmtD(filteredRecon.reduce((a,r)=>a+r.arv,0))}
                        </td>
                        <td colSpan={2} style={{padding:"10px 12px",fontSize:11,color:C.muted}}>Total ARV in view</td>
                      </tr>
                    </tfoot>
                  </table>
                </div>
                <div style={{marginTop:14,fontSize:11,color:C.muted,lineHeight:1.6}}>
                  ARV = Annual Recurring Value per Pfitzer CRM. &nbsp;|&nbsp; Phone Match = customer phone verified in CallRail qualified lead record. &nbsp;|&nbsp; Source Match = CRM lead source aligns with Pesty-managed channel.
                </div>
              </div>
            )}

          </div>

          {/* Footer */}
          <div style={{margin:"0 28px",paddingTop:18,borderTop:`1px solid ${C.border}`,fontSize:11,color:C.muted}}>
            Revenue data: Pfitzer CRM export, Jan 1–Jun 12, 2025 &amp; 2026 &nbsp;|&nbsp; Call data: CallRail export, Jan 1–Jun 15, 2026 &nbsp;|&nbsp; Prepared by Pesty Marketing
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
